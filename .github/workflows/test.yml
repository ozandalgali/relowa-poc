name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests (Vitest)
        run: pnpm test || true
        # Tests exist but no test files yet in M0 — don't fail CI
        # Remove || true when first test file lands

  substrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: ./scripts/wait-for-pg.sh localhost 5433 60

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        env:
          DATABASE_URL: postgres://relowa:dev_password_change_me@localhost:5433/relowa
        run: pnpm db:migrate

      - name: Seed database
        env:
          DATABASE_URL: postgres://relowa:dev_password_change_me@localhost:5433/relowa
        run: pnpm db:seed

      - name: RLS isolation tests
        run: ./tests/rls-isolation.sh
