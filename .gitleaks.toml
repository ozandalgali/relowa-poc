title = "Gitleaks config for Relowa POC"

# Global allowlist for known POC dev credentials
# These are NOT production secrets — production uses AWS Secrets Manager + OIDC
[allowlist]
description = "POC dev credentials — not production secrets"
paths = [
  "docker/postgres/init.sql",
  "docker-compose.yml",
  "packages/db/drizzle.config.ts",
  "packages/db/src/migrate.ts",
  "packages/db/src/seed/index.ts",
  "packages/db/src/client.ts",
  ".env.example",
  "docs/runbook/",
  "docs/memory/",
  "tests/rls-isolation.sh",
  "scripts/wait-for-pg.sh",
]
