<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Type — Relowa DS</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body {
      padding: 24px;
      background: var(--surface);
      font-family: var(--font-sans);
      color: var(--foreground);
    }
    h2 {
      font-size: var(--text-h3);
      font-weight: var(--weight-semibold);
      margin: 0 0 8px;
    }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: var(--text-caption);
      font-weight: var(--weight-medium);
      color: var(--foreground-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }
    .specimen {
      margin-bottom: 40px;
    }
    .spec-label {
      font-family: var(--font-mono);
      font-size: var(--text-caption);
      font-weight: var(--weight-medium);
      color: var(--foreground-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .spec-label span {
      color: var(--foreground-subtle);
    }
    .d-h1 {
      font-size: var(--text-h1);
      font-weight: var(--weight-bold);
      line-height: var(--leading-tight);
      color: var(--foreground);
    }
    .d-h2 {
      font-size: var(--text-h2);
      font-weight: var(--weight-bold);
      line-height: var(--leading-tight);
      color: var(--foreground);
    }
    .d-h3 {
      font-size: var(--text-h3);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      color: var(--foreground);
    }
    .d-h4 {
      font-size: var(--text-h4);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      color: var(--foreground);
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 32px;
    }
  </style>
</head>
<body>

<h2>Display Type</h2>
<p class="eyebrow">Headings &middot; h1 &ndash; h4 &middot; Turkish product labels</p>

<div class="specimen">
  <div class="spec-label">h1 &middot; <span>1.75rem &frasl; 700</span></div>
  <div class="d-h1">İhale Detayı</div>
</div>

<div class="divider"></div>

<div class="specimen">
  <div class="spec-label">h2 &middot; <span>1.375rem &frasl; 700</span></div>
  <div class="d-h2">Aktif İhaleler</div>
</div>

<div class="divider"></div>

<div class="specimen">
  <div class="spec-label">h3 &middot; <span>1.125rem &frasl; 600</span></div>
  <div class="d-h3">Finansal Veriler ve Raporlamalar</div>
</div>

<div class="divider"></div>

<div class="specimen">
  <div class="spec-label">h4 &middot; <span>1rem &frasl; 600</span></div>
  <div class="d-h4">Teslimat Adresi</div>
</div>

</body>
</html>
